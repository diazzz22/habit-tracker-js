<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>Habit tracker</h1>

    <input type="text" id="habitInput" placeholder="Write an habit">
    <button id="addBtn">Add habit</button>
    <button id="deleteBtn">Delete all</button>
    
    <h2>Total habits: <span id="total"></span></h2>
    <br>
    <button id="allBtn">All</button>
    <button id="pendingBtn">Pending</button>
    <button id="completedBtn">Completed</button>
    <ul id="habitList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
